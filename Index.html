<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSchool Admin</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    overflow-x: hidden;
    background: #f8f9fa;
}
.sidebar {
    height: 100vh;
    background: #212529;
}
.sidebar a {
    color: #adb5bd;
    text-decoration: none;
}
.sidebar a:hover {
    color: white;
}
.content {
    padding: 20px;
}
.card-hover:hover {
    transform: scale(1.02);
    transition: 0.3s;
}
</style>
</head>
<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-3 col-lg-2 sidebar p-3">
    <h4 class="text-white">SmartSchool</h4>
    <hr class="text-secondary">
    <ul class="nav flex-column">
        <li class="nav-item mb-2">
            <a href="#" onclick="showSection('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </li>
        <li class="nav-item mb-2">
            <a href="#" onclick="showSection('students')"><i class="bi bi-people"></i> Students</a>
        </li>
        <li class="nav-item mb-2">
            <a href="#" onclick="showSection('payments')"><i class="bi bi-cash"></i> Payments</a>
        </li>
    </ul>
</div>

<!-- Main Content -->
<div class="col-md-9 col-lg-10 content">

<!-- DASHBOARD -->
<div id="dashboard">
    <h2>Dashboard</h2>
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card text-bg-primary card-hover">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h3 id="totalStudents">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-success card-hover">
                <div class="card-body">
                    <h5>Total Payments</h5>
                    <h3 id="totalPayments">₦0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-dark card-hover">
                <div class="card-body">
                    <h5>Active Users</h5>
                    <h3>1 Admin</h3>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- STUDENTS -->
<div id="students" style="display:none;">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Students</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#studentModal">
            <i class="bi bi-plus"></i> Add Student
        </button>
    </div>

    <table class="table table-striped mt-4">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<!-- PAYMENTS -->
<div id="payments" style="display:none;">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Payments</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#paymentModal">
            <i class="bi bi-plus"></i> Add Payment
        </button>
    </div>

    <table class="table table-striped mt-4">
        <thead class="table-dark">
            <tr>
                <th>Student</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="paymentTable"></tbody>
    </table>
</div>

</div>
</div>
</div>

<!-- Student Modal -->
<div class="modal fade" id="studentModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
    <h5>Add Student</h5>
    <button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
    <input type="text" id="studentName" class="form-control mb-2" placeholder="Full Name">
    <input type="text" id="studentClass" class="form-control mb-2" placeholder="Class">
    <input type="text" id="studentPhone" class="form-control mb-2" placeholder="Phone">
</div>
<div class="modal-footer">
    <button class="btn btn-primary" onclick="addStudent()">Save</button>
</div>
</div>
</div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
    <h5>Add Payment</h5>
    <button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
    <input type="text" id="paymentStudent" class="form-control mb-2" placeholder="Student Name">
    <input type="number" id="paymentAmount" class="form-control mb-2" placeholder="Amount">
</div>
<div class="modal-footer">
    <button class="btn btn-success" onclick="addPayment()">Save</button>
</div>
</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showSection(section) {
    document.getElementById('dashboard').style.display = "none";
    document.getElementById('students').style.display = "none";
    document.getElementById('payments').style.display = "none";
    document.getElementById(section).style.display = "block";
}

function loadStudents() {
    let students = JSON.parse(localStorage.getItem("students")) || [];
    let table = document.getElementById("studentTable");
    table.innerHTML = "";

    students.forEach((student, index) => {
        table.innerHTML += `
            <tr>
                <td>${student.name}</td>
                <td>${student.class}</td>
                <td>${student.phone}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteStudent(${index})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("totalStudents").innerText = students.length;
}

function addStudent() {
    let name = document.getElementById("studentName").value;
    let studentClass = document.getElementById("studentClass").value;
    let phone = document.getElementById("studentPhone").value;

    let students = JSON.parse(localStorage.getItem("students")) || [];
    students.push({ name, class: studentClass, phone });
    localStorage.setItem("students", JSON.stringify(students));

    loadStudents();
    location.reload();
}

function deleteStudent(index) {
    let students = JSON.parse(localStorage.getItem("students"));
    students.splice(index, 1);
    localStorage.setItem("students", JSON.stringify(students));
    loadStudents();
}

function loadPayments() {
    let payments = JSON.parse(localStorage.getItem("payments")) || [];
    let table = document.getElementById("paymentTable");
    table.innerHTML = "";
    let total = 0;

    payments.forEach(payment => {
        total += Number(payment.amount);
        table.innerHTML += `
            <tr>
                <td>${payment.student}</td>
                <td>₦${payment.amount}</td>
                <td>${payment.date}</td>
            </tr>
        `;
    });

    document.getElementById("totalPayments").innerText = "₦" + total;
}

function addPayment() {
    let student = document.getElementById("paymentStudent").value;
    let amount = document.getElementById("paymentAmount").value;

    let payments = JSON.parse(localStorage.getItem("payments")) || [];
    payments.push({
        student,
        amount,
        date: new Date().toLocaleDateString()
    });

    localStorage.setItem("payments", JSON.stringify(payments));
    loadPayments();
    location.reload();
}

loadStudents();
loadPayments();
</script>

</body>
  </html>
